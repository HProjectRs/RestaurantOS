name: Feature Request
description: Suggest an idea for RestaurantOS
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - HProjectRs
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We value your input.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is
      placeholder: I'm always frustrated when [...]
  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution
      description: What would you like to see happen?
      placeholder: A clear and concise description of what you want to happen
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
      placeholder: A clear and concise description of any alternative solutions or features you've considered
  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      description: Which part of the application would this affect?
      options:
        - POS System
        - Kitchen Display
        - Menu Management
        - Table Management
        - Employee Management
        - Payments (Stripe)
        - Reports & Analytics
        - Guest WiFi
        - Authentication
        - General / Other
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples here
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
