name: Bug Report
description: Create a report to help us improve RestaurantOS
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - HProjectRs
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Tell us what happened...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this happen?
      options:
        - Development (localhost)
        - Production (deployed)
        - Docker
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser were you using?
      placeholder: Chrome 124, Firefox 125, etc.
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have included all relevant information
          required: true
